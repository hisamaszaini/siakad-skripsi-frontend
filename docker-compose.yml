version: "3.8"

services:
  siakad-skripsi-frontend:
    build:
      context: .
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    container_name: siakad-skripsi-frontend
    ports:
      - "3010:3000"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    healthcheck:
      test: ["CMD", "bun", "healthcheck.ts"]
      interval: 30s
      timeout: 10s
      retries: 3
